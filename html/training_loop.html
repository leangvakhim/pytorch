<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyTorch Training Loop Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for rendering equations -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    MathJax.startup.promise.then(() => {
                        console.log('MathJax initial typesetting complete');
                    });
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pytorch: {
                            DEFAULT: '#EE4C2C',
                            light: '#fde9e6',
                            dark: '#c73e23'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth transitions */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Flowchart animation lines */
        .dash-line {
            stroke-dasharray: 6;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -12;
            }
        }

        .dash-line-reverse {
            stroke-dasharray: 6;
            animation: dash-reverse 1s linear infinite;
        }

        @keyframes dash-reverse {
            to {
                stroke-dashoffset: 12;
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 sm:p-8 font-sans text-gray-800">

    <!-- Main Card Container with White Background -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-5xl overflow-hidden flex flex-col min-h-[600px]">

        <!-- Header -->
        <div class="bg-pytorch text-white p-6 flex items-center gap-4">
            <!-- PyTorch Logo (Simplified SVG) -->
            <svg width="40" height="40" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M198.8 0C89.5 0 0 88.5 0 197.8C0 307.2 88.5 395.7 197.8 395.7C307.2 395.7 395.7 307.2 395.7 197.8C395.7 88.5 307.2 0 198.8 0ZM251.5 288.7L189 313.3V233.1H147.2V166.7H189V135L251.5 110.4V288.7Z"
                    fill="white" />
            </svg>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">The PyTorch Training Loop</h1>
                <p class="text-pytorch-light text-sm">A step-by-step visual breakdown</p>
            </div>
        </div>

        <!-- Progress Indicator -->
        <div class="px-8 pt-6 pb-2 border-b border-gray-100">
            <div class="flex justify-between items-center" id="progress-container">
                <!-- Progress steps injected here via JS -->
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col md:flex-row p-8 gap-8">

            <!-- Left Side: Visualization / Math Area -->
            <div class="w-full md:w-1/2 flex items-center justify-center bg-gray-50 rounded-xl border border-gray-200 p-6 relative min-h-[300px]"
                id="visual-area">
                <!-- Visuals injected here via JS -->
            </div>

            <!-- Right Side: Explanation and Code -->
            <div class="w-full md:w-1/2 flex flex-col justify-center gap-6" id="text-area">
                <!-- Text and Code injected here via JS -->
            </div>

        </div>

        <!-- Footer Controls -->
        <div class="bg-gray-50 p-6 border-t border-gray-200 flex justify-between items-center">
            <button id="btn-prev"
                class="px-6 py-2 rounded-lg font-medium text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                &larr; Previous Step
            </button>
            <span class="text-gray-500 text-sm font-medium" id="step-counter">Step 1 of X</span>
            <button id="btn-next"
                class="px-6 py-2 rounded-lg font-medium text-white bg-pytorch hover:bg-pytorch-dark transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Next Step &rarr;
            </button>
        </div>
    </div>

    <script src="../js/training_loop.js"></script>
</body>

</html>
