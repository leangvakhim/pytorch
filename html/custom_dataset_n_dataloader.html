<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyTorch Datasets & DataLoaders</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- MathJax for rendering equations -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pytorch: '#EE4C2C', // Official PyTorch color
                        pytorchDark: '#c73e23'
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom scrollbar for code blocks */
        .code-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .code-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .code-scroll::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
    </style>
</head>

<body class="bg-white text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div
        class="max-w-4xl w-full bg-white border border-gray-200 shadow-xl rounded-2xl overflow-hidden flex flex-col h-[800px] md:h-[700px]">

        <!-- Header -->
        <div class="bg-gray-50 border-b border-gray-200 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-fire-flame-curved text-pytorch text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800">PyTorch Data Pipeline</h1>
            </div>
            <div class="text-sm font-medium text-gray-500 bg-gray-200 px-3 py-1 rounded-full" id="step-counter">
                Step 1 of 5
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-1.5">
            <div id="progress-bar" class="bg-pytorch h-1.5 transition-all duration-300 ease-out" style="width: 20%;">
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-grow flex flex-col p-6 overflow-y-auto relative">

            <!-- Dynamic Content Container -->
            <div id="content-container" class="flex-grow flex flex-col justify-center gap-8 fade-in">
                <!-- Injected via JS -->
            </div>

        </div>

        <!-- Footer / Controls -->
        <div class="bg-gray-50 border-t border-gray-200 px-6 py-4 flex justify-between items-center mt-auto">
            <button id="btn-prev"
                class="px-5 py-2.5 rounded-lg font-medium text-gray-600 hover:bg-gray-200 transition-colors disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Previous
            </button>

            <div id="dots-container" class="flex gap-2">
                <!-- Dots injected via JS -->
            </div>

            <button id="btn-next"
                class="px-5 py-2.5 rounded-lg font-medium bg-pytorch text-white hover:bg-pytorchDark transition-colors flex items-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed">
                Next <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

    </div>

    <script src="../js/custom_dataset_n_dataloader.js"></script>
</body>

</html>
