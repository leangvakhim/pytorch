<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyTorch Hardware Acceleration Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for rendering equations -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom CPU/GPU grid animations */
        .core {
            transition: all 0.3s ease;
        }

        .core.active {
            background-color: #EE4C2C;
            transform: scale(1.1);
        }

        /* Matrix visualization styles */
        .matrix {
            display: inline-grid;
            gap: 4px;
            padding: 8px;
            border-left: 2px solid #334155;
            border-right: 2px solid #334155;
            border-radius: 4px;
        }

        .cell {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border-radius: 4px;
            background-color: #e2e8f0;
            transition: background-color 0.3s;
        }

        .cell.highlight-a {
            background-color: #fca5a5;
            color: #7f1d1d;
            font-weight: bold;
        }

        .cell.highlight-b {
            background-color: #93c5fd;
            color: #1e3a8a;
            font-weight: bold;
        }

        .cell.highlight-c {
            background-color: #d8b4fe;
            color: #4c1d95;
            font-weight: bold;
        }

        /* Code line animation */
        .code-line {
            opacity: 0;
            animation: fadeInCode 0.3s ease-in-out forwards;
        }

        @keyframes fadeInCode {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 text-slate-800">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[700px]">
        <!-- Header -->
        <div class="bg-slate-50 border-b border-slate-100 p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-[#EE4C2C]" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z" />
                </svg>
                <h1 class="text-2xl font-bold text-slate-800">Hardware Acceleration in PyTorch</h1>
            </div>
            <div class="flex gap-2" id="progress-dots">
                <!-- Dots injected by JS -->
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 p-8 flex flex-col relative overflow-y-auto">
            <div id="step-content" class="fade-in flex-1 flex flex-col">
                <!-- Content injected by JS -->
            </div>
        </div>

        <!-- Footer / Controls -->
        <div class="bg-slate-50 border-t border-slate-100 p-6 flex justify-between items-center">
            <button id="btn-prev"
                class="px-6 py-2.5 rounded-lg font-medium text-slate-600 hover:bg-slate-200 hover:text-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                &larr; Back
            </button>
            <div id="step-indicator" class="text-sm font-medium text-slate-500">
                Step 1 of 5
            </div>
            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-medium bg-[#EE4C2C] text-white hover:bg-[#d63f21] transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                Next Step &rarr;
            </button>
        </div>
    </div>

    <script src="../js/hardware_acceleration.js"></script>
</body>

</html>
