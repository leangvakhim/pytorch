<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyTorch Autograd & Computational Graphs</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX for beautiful math equations -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        /* Smooth transitions for SVG elements */
        .svg-element {
            transition: all 0.5s ease-in-out;
        }

        .hidden-node {
            opacity: 0;
            pointer-events: none;
        }

        .visible-node {
            opacity: 1;
        }

        /* Dashed animation for backward pass arrows */
        .dash-anim {
            stroke-dasharray: 8;
            animation: dash 1s linear infinite reverse;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 16;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans flex items-start justify-center py-10 px-4">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">

        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center relative">
            <h1 class="text-3xl font-bold mb-2">Computational Graphs & Autograd</h1>
            <p class="text-blue-100">Understanding how PyTorch calculates gradients step-by-step</p>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-0">

            <!-- Left Side: SVG Visualization -->
            <div
                class="p-6 bg-gray-50 border-b md:border-b-0 md:border-r border-gray-200 flex items-center justify-center">
                <svg viewBox="0 0 600 400" class="w-full h-auto max-w-lg drop-shadow-md">
                    <!-- Definitions for arrowheads -->
                    <defs>
                        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6"
                            orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6" />
                        </marker>
                        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
                            orient="auto-start-reverse">
                            <path d="M 10 0 L 0 5 L 10 10 z" fill="#EF4444" />
                        </marker>
                    </defs>

                    <!-- Forward Pass Edges (Blue) -->
                    <g id="forward-edges" class="svg-element hidden-node">
                        <line x1="130" y1="100" x2="270" y2="150" stroke="#3B82F6" stroke-width="3"
                            marker-end="url(#arrow-blue)" />
                        <line x1="130" y1="200" x2="270" y2="150" stroke="#3B82F6" stroke-width="3"
                            marker-end="url(#arrow-blue)" />
                        <line x1="130" y1="300" x2="470" y2="225" stroke="#3B82F6" stroke-width="3"
                            marker-end="url(#arrow-blue)" />
                        <line x1="330" y1="150" x2="470" y2="225" stroke="#3B82F6" stroke-width="3"
                            marker-end="url(#arrow-blue)" />
                    </g>

                    <!-- Backward Pass Edges (Red Dashed) -->
                    <g id="backward-edges-1" class="svg-element hidden-node">
                        <path d="M 470 205 Q 400 120 330 130" fill="none" stroke="#EF4444" stroke-width="3"
                            class="dash-anim" marker-end="url(#arrow-red)" />
                        <path d="M 470 245 Q 400 320 130 320" fill="none" stroke="#EF4444" stroke-width="3"
                            class="dash-anim" marker-end="url(#arrow-red)" />
                    </g>
                    <g id="backward-edges-2" class="svg-element hidden-node">
                        <path d="M 270 130 Q 200 80 130 80" fill="none" stroke="#EF4444" stroke-width="3"
                            class="dash-anim" marker-end="url(#arrow-red)" />
                        <path d="M 270 170 Q 200 220 130 220" fill="none" stroke="#EF4444" stroke-width="3"
                            class="dash-anim" marker-end="url(#arrow-red)" />
                    </g>

                    <!-- Nodes: Inputs (x, y, z) -->
                    <g id="node-inputs" class="svg-element hidden-node">
                        <circle cx="100" cy="100" r="30" fill="white" stroke="#1F2937" stroke-width="3" />
                        <text x="100" y="105" text-anchor="middle" font-size="18" font-weight="bold"
                            fill="#1F2937">x=2</text>
                        <circle cx="100" cy="200" r="30" fill="white" stroke="#1F2937" stroke-width="3" />
                        <text x="100" y="205" text-anchor="middle" font-size="18" font-weight="bold"
                            fill="#1F2937">y=3</text>
                        <circle cx="100" cy="300" r="30" fill="white" stroke="#1F2937" stroke-width="3" />
                        <text x="100" y="305" text-anchor="middle" font-size="18" font-weight="bold"
                            fill="#1F2937">z=4</text>
                    </g>

                    <!-- Node: Intermediate (q) -->
                    <g id="node-q" class="svg-element hidden-node">
                        <circle cx="300" cy="150" r="30" fill="white" stroke="#3B82F6" stroke-width="3" />
                        <text x="300" y="145" text-anchor="middle" font-size="18" font-weight="bold"
                            fill="#3B82F6">q=6</text>
                        <text x="300" y="165" text-anchor="middle" font-size="12" fill="#6B7280">(x * y)</text>
                    </g>

                    <!-- Node: Output (f) -->
                    <g id="node-f" class="svg-element hidden-node">
                        <circle cx="500" cy="225" r="30" fill="white" stroke="#3B82F6" stroke-width="3" />
                        <text x="500" y="220" text-anchor="middle" font-size="18" font-weight="bold"
                            fill="#3B82F6">f=10</text>
                        <text x="500" y="240" text-anchor="middle" font-size="12" fill="#6B7280">(q + z)</text>
                    </g>

                    <!-- Gradients (Backward Pass Values) -->
                    <g id="grad-f" class="svg-element hidden-node">
                        <rect x="470" y="150" width="60" height="25" rx="4" fill="#FEE2E2" stroke="#EF4444" />
                        <text x="500" y="167" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">∇f =
                            1</text>
                    </g>
                    <g id="grad-q-z" class="svg-element hidden-node">
                        <rect x="270" y="75" width="60" height="25" rx="4" fill="#FEE2E2" stroke="#EF4444" />
                        <text x="300" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">∇q =
                            1</text>
                        <rect x="70" y="345" width="60" height="25" rx="4" fill="#FEE2E2" stroke="#EF4444" />
                        <text x="100" y="362" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">∇z =
                            1</text>
                    </g>
                    <g id="grad-x-y" class="svg-element hidden-node">
                        <rect x="70" y="35" width="60" height="25" rx="4" fill="#FEE2E2" stroke="#EF4444" />
                        <text x="100" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">∇x =
                            3</text>
                        <rect x="70" y="245" width="60" height="25" rx="4" fill="#FEE2E2" stroke="#EF4444" />
                        <text x="100" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#EF4444">∇y =
                            2</text>
                    </g>
                </svg>
            </div>

            <!-- Right Side: Explanations & Math -->
            <div class="p-8 flex flex-col justify-between min-h-[450px]">
                <div>
                    <div class="flex items-center space-x-2 mb-4">
                        <span id="step-badge"
                            class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">Step
                            0 / 6</span>
                    </div>
                    <h2 id="step-title" class="text-2xl font-bold text-gray-800 mb-3">The Problem Setup</h2>
                    <p id="step-desc" class="text-gray-600 mb-6 leading-relaxed">
                        Welcome! Let's explore how PyTorch calculates gradients using a computational graph.
                    </p>

                    <!-- Math Container -->
                    <div
                        class="bg-gray-50 rounded-lg p-4 border border-gray-200 min-h-[100px] flex flex-col justify-center overflow-x-auto">
                        <div id="math-container" class="text-center text-lg"></div>
                    </div>

                    <!-- Conditional Chain Rule Button (Shown only on Step 4) -->
                    <div id="chain-rule-btn-container" class="hidden mt-4">
                        <a href="./chain_rule_visualization.html" target="_blank"
                            class="w-full block text-center px-5 py-3 bg-emerald-600 border-2 border-emerald-600 text-white font-semibold rounded-lg hover:bg-emerald-700 transition shadow-md">
                            Chain Rule visualization &rarr;
                        </a>
                    </div>
                </div>

                <!-- Controls and External Link Section -->
                <div class="mt-8 flex flex-col gap-4">
                    <!-- Standard Back / Next Step Controls -->
                    <div class="flex justify-between">
                        <button id="btn-back" onclick="changeStep(-1)"
                            class="px-5 py-2.5 bg-white border-2 border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-50 hover:border-gray-400 transition disabled:opacity-50 disabled:cursor-not-allowed">
                            &larr; Back
                        </button>
                        <button id="btn-next" onclick="changeStep(1)"
                            class="px-5 py-2.5 bg-blue-600 border-2 border-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
                            Next Step &rarr;
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Store our steps data
        const steps = [
            {
                title: "The Objective",
                desc: "We have a simple mathematical function with three inputs (x, y, z). Our goal is to calculate the final output (Forward Pass) and then figure out how much each input contributed to the output (Backward Pass / Gradients).",
                math: "f(x,y,z) = (x \\times y) + z",
                svgState: [] // which SVG elements to show
            },
            {
                title: "Step 1: Input Tensors",
                desc: "In PyTorch, we define our variables as Tensors with <code>requires_grad=True</code>. These form the starting nodes (leaves) of our computational graph.",
                math: "\\text{Let } x=2, \\; y=3, \\; z=4",
                svgState: ['node-inputs']
            },
            {
                title: "Step 2: Forward Pass (Multiplication)",
                desc: "PyTorch evaluates operations step-by-step. First, it creates an intermediate node <b>q</b> for the multiplication. It saves this graph in memory for later.",
                math: "q = x \\times y = 2 \\times 3 = 6",
                svgState: ['node-inputs', 'forward-edges', 'node-q']
            },
            {
                title: "Step 3: Forward Pass (Addition)",
                desc: "Next, it adds <b>z</b> to <b>q</b> to get our final output <b>f</b>. The Forward Pass is now complete! The blue graph represents PyTorch's memory of the operations.",
                math: "f = q + z = 6 + 4 = 10",
                svgState: ['node-inputs', 'forward-edges', 'node-q', 'node-f']
            },
            {
                title: "The Math: Chain Rule Equations",
                desc: "Before we go backwards, let's look at the Calculus. Autograd uses the <b>Chain Rule</b>. To find how <b>x</b> affects <b>f</b> ($\\frac{\\partial f}{\\partial x}$), we multiply the local gradients along the path.",
                math: "\\begin{aligned} &\\frac{\\partial f}{\\partial q} = 1, \\quad \\frac{\\partial f}{\\partial z} = 1 \\\\[6pt] &\\frac{\\partial q}{\\partial x} = y, \\quad \\frac{\\partial q}{\\partial y} = x \\\\[6pt] &\\frac{\\partial f}{\\partial x} = \\frac{\\partial f}{\\partial q} \\times \\frac{\\partial q}{\\partial x} = 1 \\times 3 = 3 \\end{aligned}",
                svgState: ['node-inputs', 'forward-edges', 'node-q', 'node-f']
            },
            {
                title: "Step 4: Backward Pass (Output & Addition)",
                desc: "When we call <code>f.backward()</code>, PyTorch pushes a gradient of 1 starting from <b>f</b>. Because addition just passes gradients equally, <b>q</b> and <b>z</b> receive a gradient of 1.",
                math: "\\nabla f = 1 \\\\ \\nabla q = 1, \\quad \\nabla z = 1",
                svgState: ['node-inputs', 'forward-edges', 'node-q', 'node-f', 'grad-f', 'backward-edges-1', 'grad-q-z']
            },
            {
                title: "Step 5: Backward Pass (Multiplication)",
                desc: "The gradient continues to flow back to <b>x</b> and <b>y</b>. For multiplication, the local gradient is the <i>other</i> multiplier. PyTorch multiplies the incoming gradient (1) by the local gradients (y and x).",
                math: "\\nabla x = \\nabla q \\times y = 1 \\times 3 = 3 \\\\ \\nabla y = \\nabla q \\times x = 1 \\times 2 = 2",
                svgState: ['node-inputs', 'forward-edges', 'node-q', 'node-f', 'grad-f', 'backward-edges-1', 'grad-q-z', 'backward-edges-2', 'grad-x-y']
            }
        ];

        let currentStep = 0;

        function updateUI() {
            const stepData = steps[currentStep];

            // Update Text
            document.getElementById('step-badge').innerText = `Step ${currentStep} / ${steps.length - 1}`;
            document.getElementById('step-title').innerText = stepData.title;

            // Parse inline math ($...$) in the description using KaTeX
            const formattedDesc = stepData.desc.replace(/\$(.*?)\$/g, (match, mathContent) => {
                return katex.renderToString(mathContent, { throwOnError: false, displayMode: false });
            });
            document.getElementById('step-desc').innerHTML = formattedDesc;

            // Render Math using KaTeX
            const mathContainer = document.getElementById('math-container');
            if (stepData.math) {
                katex.render(stepData.math, mathContainer, {
                    throwOnError: false,
                    displayMode: true
                });
            } else {
                mathContainer.innerHTML = "";
            }

            // Update Buttons
            document.getElementById('btn-back').disabled = currentStep === 0;
            document.getElementById('btn-next').disabled = currentStep === steps.length - 1;

            // Toggle Chain Rule Button visibility (Only in Step 4)
            const chainRuleBtn = document.getElementById('chain-rule-btn-container');
            if (currentStep === 4) {
                chainRuleBtn.classList.remove('hidden');
            } else {
                chainRuleBtn.classList.add('hidden');
            }

            // Update SVG States
            // First, hide everything
            const allElements = ['node-inputs', 'forward-edges', 'node-q', 'node-f', 'grad-f', 'backward-edges-1', 'grad-q-z', 'backward-edges-2', 'grad-x-y'];
            allElements.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove('visible-node');
                    el.classList.add('hidden-node');
                }
            });

            // Then, show elements for the current step
            stepData.svgState.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove('hidden-node');
                    el.classList.add('visible-node');
                }
            });
        }

        function changeStep(direction) {
            currentStep += direction;
            if (currentStep < 0) currentStep = 0;
            if (currentStep >= steps.length) currentStep = steps.length - 1;
            updateUI();
        }

        // Initialize first step after page loads to ensure KaTeX is ready
        window.onload = () => {
            updateUI();
        };
    </script>
</body>

</html>
